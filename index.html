<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordly</title>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo"></div>
            <nav class="nav-tabs">
                <button type="submit" id="nav-btn1">Search</button>
                <button type="submit" id="nav-btn2">Saved</button>
            </nav>
        </header>

        <section class="search-panel">
            <div class="hero">
                <h1 class="search-title">Look up any word. Boost your vocabulary.</h1>
            </div>

            <div class="search-bar">
                <input type="text" placeholder="Enter word" id="search-input">
                <button type="submit" id="search-btn">
                    <img src="" alt="">
                </button>
            </div>

            <div class="search-result"></div>

            <div id="fav-panel">
                <div class="fav-header">
                    <h3 class="fav-title">Saved Words</h3>
                </div>

                <div id="fav-list"></div>
            </div>
        </section>
    </div>
</body>
</html>
