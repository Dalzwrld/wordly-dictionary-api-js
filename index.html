<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordly</title>

    <link rel="stylesheet" href="styles.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
</head>
<body>
    <main class="container">
        <header>
            <div class="logo">Wordly</div>
            <div class="fav-badge-pill" id="fav-badge-pill">
                <img src="images/icons8-heart-48.png" alt="Heart icon">
            </div>
            <span id="fav-badge">0</span>
        </header>

        <section class="search-panel">
            <section class="hero">
                <h1 class="search-title">Look up any word. Let <em>Wordly</em> be your guide.</h1>
                
                <div class="search-bar" id="search-bar">
                    <input type="text" placeholder="Enter word e.g. ephemeral, serene" id="search-input">
                    <button type="button" id="search-btn">
                        Search
                    </button>
                </div>
            </section>
        </section>

        <section class="result-panel">
            <div class="result-card" id="result-card"></div>
        </section>

        <section id="fav-panel">
            <div class="fav-header">
                <h2 class="fav-title">Saved Words</h2>
                <span class="fav-count" id="fav-count-label"></span>
            </div>

            <div id="fav-list"></div>
        </section>
        
        <section id="toast"></section>

        <footer id="footer">
            <span class="footer-text">
                Icons by
            </span>

            <a href="https://icons8.com/icons" target="_blank">
                <span>
                    Icons8
                </span>
            </a>
        </footer>
    </main>
    
    <script src="main.js"></script>
</body>


</html>
