<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordly</title>

    <link rel="stylesheet" href="styles.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
</head>
<body>
    <main class="container">
        <header>
            <div class="logo">Wordly</div>
            <nav class="nav-tabs">
                <button type="submit" id="nav-btn1">Search</button>
                <button type="submit" id="nav-btn2">Saved</button>
            </nav>
        </header>

        <section class="search-panel">
            <section class="hero">
                <h1 class="search-title">Look up any word. Boost your vocabulary.</h1>
            </section>

            <section class="search-bar">
                <input type="text" placeholder="Enter word" id="search-input">
                <button type="submit" id="search-btn">
                    <img src="images/icons8-search-50.png" alt="Search icon">
                </button>
            </section>

            <section class="result-panel">
                <div class="result-card"></div>
            </section>

            <section id="fav-panel">
                <div class="fav-header">
                    <h4 class="fav-title">Saved Words</h4>
                </div>

                <div id="fav-list"></div>
            </section>
        </section>
    </main>

    <section id="toast"></section>
</body>
</html>
